<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1b0d0a" />
  <title>Chocolate Cafe Springfield, IL</title>
  <style>
    :root {
      --bg: #160b08;
      --bg2: #0b0605;
      --card: rgba(29, 15, 11, 0.88);
      --gold: #c89f52;
      --gold-light: #efd08a;
      --text: #fff8ee;
      --muted: #d9c3a0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 0%, rgba(200,159,82,.14), transparent 30%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      display: flex;
      justify-content: center;
      padding: 18px;
    }

    .page {
      width: min(620px, 100%);
      min-height: calc(100vh - 36px);
      position: relative;
      border: 1px solid rgba(200,159,82,.8);
      border-radius: 28px;
      padding: 18px;
      background: linear-gradient(180deg, rgba(28,14,10,.98), rgba(11,6,5,.98));
      box-shadow: 0 28px 80px rgba(0,0,0,.55);
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(200,159,82,.28);
      border-radius: 21px;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 8px 10px 22px;
    }

    .logo-wrap {
      text-align: center;
      margin: 2px auto 18px;
    }

    .logo-wrap img {
      display: block;
      width: min(100%, 520px);
      margin: 0 auto;
      border-radius: 18px;
      box-shadow: 0 12px 28px rgba(0,0,0,.28);
    }

    .headline {
      text-align: center;
      margin: 18px 0 20px;
      color: var(--gold-light);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(21px, 5vw, 29px);
      font-style: italic;
      letter-spacing: .4px;
    }

    .divider {
      height: 1px;
      width: 78%;
      margin: 0 auto 20px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .links {
      display: grid;
      gap: 14px;
    }

    .link-card {
      display: grid;
      grid-template-columns: 58px 1fr 28px;
      align-items: center;
      gap: 12px;
      min-height: 86px;
      padding: 14px 18px;
      border: 1.5px solid var(--gold);
      border-radius: 18px;
      text-decoration: none;
      color: white;
      background:
        radial-gradient(circle at 50% 120%, rgba(200,159,82,.14), transparent 55%),
        rgba(17,9,7,.92);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.02),
        0 8px 20px rgba(0,0,0,.2);
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .link-card:hover,
    .link-card:focus-visible {
      transform: translateY(-2px);
      background: rgba(29,15,11,.98);
      box-shadow: 0 14px 28px rgba(0,0,0,.32);
      outline: none;
    }

    .icon {
      width: 46px;
      height: 46px;
      color: var(--gold-light);
      display: grid;
      place-items: center;
    }

    .icon svg {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand-icon svg.fill {
      fill: currentColor;
      stroke: none;
    }

    .label {
      text-align: center;
      font-size: clamp(18px, 4vw, 24px);
      letter-spacing: 3px;
      font-weight: 500;
    }

    .arrow {
      color: var(--gold);
      font-size: 34px;
      line-height: 1;
      text-align: right;
      transform: translateY(-1px);
    }

    .address {
      margin: 22px auto 4px;
      max-width: 470px;
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 14px;
      align-items: center;
      color: var(--text);
      font-size: clamp(17px, 4vw, 22px);
      line-height: 1.45;
      text-align: left;
    }

    .address .icon {
      width: 40px;
      height: 40px;
    }

    @media (max-width: 430px) {
      body { padding: 10px; }
      .page { padding: 12px; border-radius: 22px; }
      .content { padding: 4px 4px 18px; }
      .link-card {
        grid-template-columns: 48px 1fr 22px;
        min-height: 76px;
        padding: 12px 14px;
      }
      .icon { width: 40px; height: 40px; }
      .label { letter-spacing: 2px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="content">
      <div class="logo-wrap">
        <img src="chocolate-cafe-logo.jpeg" alt="Chocolate Cafe logo" />
      </div>

      <div class="headline">Follow Us &amp; Stay Updated</div>
      <div class="divider"></div>

      <section class="links" aria-label="Chocolate Cafe links">

        <a class="link-card" href="https://www.google.com/maps/search/?api=1&query=4151%20Wabash%20Ave%2C%20Springfield%2C%20IL%2062711" target="_blank" rel="noopener">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 21s6-5.2 6-11a6 6 0 1 0-12 0c0 5.8 6 11 6 11Z"/>
              <circle cx="12" cy="10" r="2.2"/>
            </svg>
          </span>
          <span class="label">GET DIRECTIONS</span>
          <span class="arrow">›</span>
        </a>

        <a class="link-card" href="https://www.instagram.com/chocolatecafe_springfieldil" target="_blank" rel="noopener">
          <span class="icon brand-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="3.5" y="3.5" width="17" height="17" rx="5"/>
              <circle cx="12" cy="12" r="4"/>
              <circle cx="17.5" cy="6.5" r=".8" class="fill"/>
            </svg>
          </span>
          <span class="label">INSTAGRAM</span>
          <span class="arrow">›</span>
        </a>

        <a class="link-card" href="https://www.tiktok.com/@chocolate.cafe39" target="_blank" rel="noopener">
          <span class="icon brand-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="fill">
              <path d="M14.2 3.2c.4 2.1 1.7 3.6 3.8 4.2v3a8 8 0 0 1-3.7-1.1v5.8a5.5 5.5 0 1 1-4.8-5.4v3.1a2.5 2.5 0 1 0 1.8 2.4V3.2h2.9Z"/>
            </svg>
          </span>
          <span class="label">TIKTOK</span>
          <span class="arrow">›</span>
        </a>

        <a class="link-card" href="https://www.facebook.com/share/1KYqQyWBa5/" target="_blank" rel="noopener">
          <span class="icon brand-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="fill">
              <path d="M13.6 21v-8h2.7l.4-3h-3.1V8.1c0-.9.3-1.6 1.6-1.6h1.7V3.8c-.3 0-1.3-.1-2.5-.1-2.5 0-4.2 1.5-4.2 4.3V10H7.4v3h2.8v8h3.4Z"/>
            </svg>
          </span>
          <span class="label">FACEBOOK</span>
          <span class="arrow">›</span>
        </a>

      </section>

      <div class="address">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 21s6-5.2 6-11a6 6 0 1 0-12 0c0 5.8 6 11 6 11Z"/>
            <circle cx="12" cy="10" r="2.2"/>
          </svg>
        </span>
        <span>4151 Wabash Ave<br>Springfield, IL 62711</span>
      </div>
    </div>
  </main>
</body>
</html>
